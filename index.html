<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYTFLIX - 현재 상영 중인 영화</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="header__inner">
            <h1 class="logo">MYTFLIX</h1>
            <nav class="nav">
                <a href="#" class="nav__link nav__link--active">홈</a>
                <a href="#" class="nav__link">영화</a>
                <a href="#" class="nav__link">시리즈</a>
                <a href="#" class="nav__link">내가 찜한 콘텐츠</a>
            </nav>
        </div>
    </header>

    <main class="main">
        <section class="hero" id="hero">
            <div class="hero__overlay"></div>
            <div class="hero__content">
                <h2 class="hero__title" id="heroTitle">로딩 중...</h2>
                <p class="hero__overview" id="heroOverview"></p>
                <div class="hero__buttons">
                    <button class="btn btn--play">▶ 재생</button>
                    <button class="btn btn--info">ⓘ 상세 정보</button>
                </div>
            </div>
        </section>

        <section class="row">
            <h3 class="row__title">현재 상영 중인 영화</h3>
            <div class="row__posters" id="posters">
                <div class="loading">영화를 불러오는 중...</div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>Powered by <a href="https://www.themoviedb.org/" target="_blank" rel="noopener">TMDB</a></p>
    </footer>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
